<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2:Discount Portal</title>
    <link rel="stylesheet" href="styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <header class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <img src="bananalogo.png" alt="logo" style="height:40px; width:40px; border-radius:50%; object-fit:cover;">
      <a class="navbar-brand ms-2" href="#">Banana</a>
    </div>
    <button class="btn btn-danger">PROMO!!!</button>

  </div>
</header>

    <main class= "container" id="container">
      <div class="container mt-4 shadow p-5 form-hero">
      <h1> Want a gaming laptop?</h1> <br>
      <h5 class="text-muted">Enter your budget to find the right one!</h5> <br>
      <input type="number" name="ogbudget" id="budgetInput" class="form-control w-60" placeholder="Enter your budget: E.g. 300">
    </div>

    <div class="getDiscount">
       <button class=" btn btn-primary float-left mt-3" onclick="buttonDiscount()"> Brand & Discount</button>
       <div id="discinfo">
        <div class="container">
          <hr>
          <p id="discountInfo" class="text-muted"></p>
        </div>
       </div>
       
      <button class=" btn btn-primary float-right mt-3" onclick="buttonLocation()"> Store Locations</button>
        <div id="storeLoca">
          <input type="location" name="storeloc">
          <hr>
        </div>

      <button class=" btn btn-primary mt-3" onclick="window.location.reload()"> Refresh</button>
      
        

    </div>
    
      
    </main>

    <footer class="bg-dark text-white text-center py-3 fixed-bottom text-center"> &copy; 2026 Banana Inc. All rights reserved.</footer>

    <script src="main.js">
   

    </script>
</body>
</html>
